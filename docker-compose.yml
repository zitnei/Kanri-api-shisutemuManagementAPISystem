version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kanri_db
      POSTGRES_USER: kanri
      POSTGRES_PASSWORD: kanri_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanri -d kanri_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kanri-network

  redis:
    image: redis:7-alpine
    container_name: kanri-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - kanri-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: kanri-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://kanri:kanri_secret@postgres:5432/kanri_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - kanri-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanri-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kanri-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kanri-network:
    driver: bridge
